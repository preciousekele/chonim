<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/chonimpreview.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nimechi weds Choko</title>

    <meta
      property="og:image"
      content="https://chokowedsnimechi.vercel.app/chonimpreview.jpeg"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chokowedsnimechi.vercel.app/" />
    <meta property="og:title" content="Choko weds Nimechi" />
    <meta
      property="og:image"
      content="https://chokowedsnimechi.vercel.app/chonimpreview.jpeg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
  </head>
  <audio
    id="bg-music"
    src="/music/background.mp3"
    loop
    volume="0.8"
    style="display: none"
  ></audio>
  <script>
    const audio = document.getElementById("bg-music");
    audio.volume = 0.8;
    const play = () => {
      audio.muted = false;
      audio.play().catch(() => {});
      ["click", "touchstart", "keydown", "scroll"].forEach((e) =>
        window.removeEventListener(e, play),
      );
    };
    ["click", "touchstart", "keydown", "scroll"].forEach((e) =>
      window.addEventListener(e, play),
    );
  </script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
